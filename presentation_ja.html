<h1 id="%E3%82%B3%E3%83%BC%E3%83%89%E3%83%AC%E3%83%93%E3%83%A5%E3%83%BC%E3%81%AE%E7%8F%BE%E7%8A%B6">コードレビューの現状</h1>
<div class="grid">
  <div class="col-left">
    <h2>よくある問題</h2>
    <ul>
      <li>チーム固有の規約が暗黙知化</li>
      <li>レビュー品質がレビュアーに依存</li>
      <li>レビュー指摘が主観的になりがち</li>
      <li>新メンバーへの規約浸透が遅い</li>
    </ul>
  </div>
  <div class="col-right">
    <h2>理想の姿</h2>
    <ul>
      <li>コーディング基準が明文化されている</li>
      <li>規約が機械的に検証される</li>
      <li>客観的で一貫したフィードバック</li>
      <li>CI/CDで自動的に強制できる</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E7%8F%BE%E5%A0%B4%E3%81%A7%E3%82%88%E3%81%8F%E8%B5%B7%E3%81%93%E3%82%8B%E3%82%B7%E3%83%8A%E3%83%AA%E3%82%AA">現場でよく起こるシナリオ</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># PR レビューにて...</span>

<span class="hljs-comment"># レビュアーA: 「logging じゃなくて structlog 使ってください」</span>
<span class="hljs-keyword">import</span> logging
logger = logging.getLogger(__name__)

<span class="hljs-comment"># レビュアーB: 「あ、それ知りませんでした...」</span>
<span class="hljs-comment"># レビュアーC: 「前のPRでは指摘されなかったのですが...」</span>
</code></pre>
<p><strong>同じ指摘が何度も繰り返される = 自動化のチャンス</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-class="three-col" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="three-col" style="--class:three-col;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%82%AB%E3%82%B9%E3%82%BF%E3%83%A0linter%E3%81%8C%E8%A7%A3%E6%B1%BA%E3%81%99%E3%82%8B3%E3%81%A4%E3%81%AE%E8%AA%B2%E9%A1%8C">カスタムLinterが解決する3つの課題</h1>
<div class="grid">
  <div class="col">
    <div class="col-icon">1</div>
    <h3>主観性の排除</h3>
    <p>コーディング規約を機械的ルールとして定義し、レビューの属人化を防ぐ</p>
    <img src="./images/objectivity.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-icon">2</div>
    <h3>理想パターンの強制</h3>
    <p>組織が定義した「あるべき姿」を自動的にコードベース全体に適用</p>
    <img src="./images/ideal-pattern.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-icon">3</div>
    <h3>人→機械への移行</h3>
    <p>人間依存のレビュープロセスから、機械検証による自動化へシフト</p>
    <img src="./images/automation.svg" style="width:100%;margin-top:0.5em" />
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;--marpit-advanced-background-split:40%;" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;https://raw.githubusercontent.com/astral-sh/ruff/main/assets/badge/v2/ruff.svg&quot;);background-size:80%;"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="11" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;--marpit-advanced-background-split:40%;" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E6%B1%8E%E7%94%A8linter%E3%81%AE%E9%99%90%E7%95%8C">汎用Linterの限界</h1>

<p><strong>ruff, flake8, pylint</strong> などの汎用Linterは優秀だが...</p>
<ul>
<li>一般的なルールのみ提供</li>
<li>組織固有の要件には対応不可</li>
<li>例: 「loggingモジュールではなくstructlogを使うこと」</li>
<li>例: 「特定のデコレータを必ず付けること」</li>
<li>例: 「非推奨APIの使用を禁止すること」</li>
</ul>
<p><strong>組織のコーディング規約を強制するには カスタムルールが不可欠</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-class="panel-emphasis" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E7%B5%84%E7%B9%94%E5%9B%BA%E6%9C%89%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AE%E5%85%B7%E4%BD%93%E4%BE%8B">組織固有ルールの具体例</h1>
<div class="panel-container">
  <h2>汎用Linterでは検出できないルール</h2>
  <p>
    <span class="highlight">logging → structlog</span> の統一<br />
    <span class="highlight">datetime.now()</span> の直接使用禁止（テスタビリティ確保）<br />
    <span class="highlight">requests</span> ではなく社内HTTPクライアントの使用<br />
    特定の例外クラスを継承しないカスタム例外の禁止<br />
    非推奨の内部APIを呼び出しているコードの検出
  </p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="02-fixit-%E3%81%A8%E3%81%AF">02. Fixit とは</h1>
<h2 id="instagram%E7%99%BA%E3%81%AEpython-lint%E3%83%95%E3%83%AC%E3%83%BC%E3%83%A0%E3%83%AF%E3%83%BC%E3%82%AF">Instagram発のPython Lintフレームワーク</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-class="panel" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel" style="--class:panel;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%81%AE%E6%A6%82%E8%A6%81">Fixit の概要</h1>
<div class="panel-container">
  <div class="panel-header">
    <div class="panel-icon">🔧</div>
    <h2>Instagram/Fixit</h2>
  </div>
  <p><strong>libcst</strong> ベースの高機能Python Lintフレームワーク。カスタムルールの作成が容易で、自動修正（autofix）機能を標準搭載。</p>
  <ul>
    <li><strong>libcst</strong> による正確な構文解析（CST = Concrete Syntax Tree）</li>
    <li>リポジトリ内にカスタムルールを配置可能</li>
    <li>修正提案の対話的な確認 or 一括自動適用</li>
    <li>階層的な設定管理（プロジェクト/ディレクトリ/ファイル単位）</li>
  </ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-class="four-col" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="four-col" style="--class:four-col;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%81%AE%E4%B8%BB%E8%A6%81%E6%A9%9F%E8%83%BD">Fixit の主要機能</h1>
<div class="grid">
  <div class="col">
    <div class="col-number">Lint</div>
    <h3>検出</h3>
    <p>ルール違反を検出して報告</p>
    <img src="./images/lint-detect.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Fix</div>
    <h3>自動修正</h3>
    <p>検出箇所を自動で修正</p>
    <img src="./images/auto-fix.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Local</div>
    <h3>ローカルルール</h3>
    <p>リポジトリ内にルール配置</p>
    <img src="./images/local-rules.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Config</div>
    <h3>階層設定</h3>
    <p>ディレクトリ毎に設定可能</p>
    <img src="./images/hierarchy-config.svg" style="width:100%;margin-top:0.5em" />
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%81%AE%E5%9F%BA%E6%9C%AC%E7%9A%84%E3%81%AA%E4%BD%BF%E3%81%84%E6%96%B9">Fixit の基本的な使い方</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># .fixit.toml で設定</span>
[fixit]
local = [<span class="hljs-string">&quot;lint_rules/&quot;</span>]    <span class="hljs-comment"># カスタムルールの配置先</span>

<span class="hljs-comment"># コマンド実行</span>
$ pip install fixit                   <span class="hljs-comment"># インストール</span>
$ fixit lint path/to/code.py          <span class="hljs-comment"># Lint実行</span>
$ fixit fix path/to/code.py           <span class="hljs-comment"># 自動修正</span>
$ fixit fix --interactive path/       <span class="hljs-comment"># 対話的に修正</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AE%E5%9F%BA%E6%9C%AC%E6%A7%8B%E9%80%A0">Fixit ルールの基本構造</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> libcst <span class="hljs-keyword">as</span> cst
<span class="hljs-keyword">import</span> fixit

<span class="hljs-keyword">class</span> <span class="hljs-title class_">MyRule</span>(fixit.LintRule):
    <span class="hljs-string">&quot;&quot;&quot;ルールの説明をここに書く&quot;&quot;&quot;</span>
    MESSAGE = <span class="hljs-string">&quot;問題の説明文&quot;</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Call</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;特定のノードを訪問して検査&quot;&quot;&quot;</span>
        <span class="hljs-comment"># ノードを検査してviolationを報告</span>
        <span class="hljs-variable language_">self</span>.report(node, message=<span class="hljs-string">&quot;修正が必要です&quot;</span>)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Import</span>(<span class="hljs-params">self, node: cst.Import</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;import文を検査&quot;&quot;&quot;</span>
        <span class="hljs-comment"># replacement を指定すると autofix が有効に</span>
        <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)
</code></pre>
<p><strong>Visitor パターン</strong>: ツリーの各ノードを巡回しながら検査する</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%81%AE%E8%A8%AD%E5%AE%9A%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB">Fixit の設定ファイル</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-toml"><span class="hljs-comment"># .fixit.toml - プロジェクトルートに配置</span>

<span class="hljs-section">[fixit]</span>
<span class="hljs-comment"># カスタムルールのディレクトリ</span>
<span class="hljs-attr">local</span> = [<span class="hljs-string">&quot;lint_rules/&quot;</span>]

<span class="hljs-comment"># 有効にするルール</span>
<span class="hljs-attr">enable</span> = [<span class="hljs-string">&quot;fixit.rules&quot;</span>, <span class="hljs-string">&quot;lint_rules&quot;</span>]

<span class="hljs-comment"># 無効にするルール</span>
<span class="hljs-attr">disable</span> = [<span class="hljs-string">&quot;fixit.rules:CompareSingletonPrimitivesByIs&quot;</span>]

<span class="hljs-comment"># Python バージョン</span>
<span class="hljs-attr">python-version</span> = <span class="hljs-string">&quot;3.14&quot;</span>
</code></pre>
<p>サブディレクトリに別の <code>.fixit.toml</code> を置くことで <strong>階層的な設定</strong> が可能</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="03-ast-vs-cst">03. AST vs CST</h1>
<h2 id="%E3%81%AA%E3%81%9C-concrete-syntax-tree-%E3%81%8C%E9%87%8D%E8%A6%81%E3%81%AA%E3%81%AE%E3%81%8B">なぜ Concrete Syntax Tree が重要なのか</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-class="center-message" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="center-message" style="--class:center-message;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%82%BD%E3%83%BC%E3%82%B9%E3%82%B3%E3%83%BC%E3%83%89%E3%82%92%E7%90%86%E8%A7%A3%E3%81%99%E3%82%8B">ソースコードを「理解」する</h1>
<h1 id="2%E3%81%A4%E3%81%AE%E3%82%A2%E3%83%97%E3%83%AD%E3%83%BC%E3%83%81">2つのアプローチ</h1>
<p>AST (Abstract Syntax Tree) と CST (Concrete Syntax Tree)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-class="two-col-compare" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="two-col-compare" style="--class:two-col-compare;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ast-vs-cst-%E3%81%AE%E9%81%95%E3%81%84">AST vs CST の違い</h1>
<div class="grid">
  <div class="col-before">
    <h2>AST（抽象構文木）</h2>
    <ul>
      <li>構造情報のみを保持</li>
      <li>コメントが失われる</li>
      <li>空白・改行が失われる</li>
      <li>フォーマットが失われる</li>
    </ul>
    <img src="./images/ast.png" style="width:70%;margin-top:0.5em" />
  </div>
  <div class="col-after">
    <h2>CST（具象構文木）</h2>
    <ul>
      <li>構造情報＋書式情報を保持</li>
      <li>コメントが保持される</li>
      <li>空白・改行が保持される</li>
      <li>元のフォーマットを維持</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ast-%E3%81%AE%E5%9F%BA%E6%9C%AC">AST の基本</h1>
<img src="./images/ast.png" style="width:70%;margin-top:0.5em" />
<p><strong>AST はコードの「意味」だけを抽出し、「見た目」を捨てる</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ast%E3%81%AE%E5%95%8F%E9%A1%8C-%E3%82%B3%E3%83%BC%E3%83%89%E5%A4%89%E6%8F%9B%E3%81%A7%E6%83%85%E5%A0%B1%E3%81%8C%E6%B6%88%E3%81%88%E3%82%8B">ASTの問題: コード変換で情報が消える</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 元のコード</span>
<span class="hljs-keyword">import</span> logging  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># アプリケーションのメインロガー</span>
logger = logging.getLogger(__name__)
</code></pre>
<p><strong>AST で変換すると...</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog
logger = structlog.get_logger()
</code></pre>
<p>コメントが消失し、チームが残したメモや意図が失われてしまう</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="cst-%E3%81%AE%E5%9F%BA%E6%9C%AC">CST の基本</h1>
<img src="./images/cst.png" style="width:60%;margin-top:0.5em" />
<p><strong>CST はコードを「完全に復元可能な形」で表現する</strong></p>
<p>ただし lib2to3 は Python 3.13 で削除済み → 後継が必要</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="cst%E3%81%AE%E5%88%A9%E7%82%B9-%E5%85%83%E3%81%AE%E3%82%B9%E3%82%BF%E3%82%A4%E3%83%AB%E3%82%92%E5%AE%8C%E5%85%A8%E3%81%AB%E4%BF%9D%E6%8C%81">CSTの利点: 元のスタイルを完全に保持</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 元のコード</span>
<span class="hljs-keyword">import</span> logging  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># アプリケーションのメインロガー</span>
logger = logging.getLogger(__name__)
</code></pre>
<p><strong>CST で変換すると...</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># アプリケーションのメインロガー</span>
logger = structlog.get_logger()
</code></pre>
<p>コメント・空白・フォーマットを保持したまま安全に変換</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%81%9F%E3%81%A0%E3%81%97lib2to3-%E3%83%99%E3%83%BC%E3%82%B9%E3%81%AE-cst-%E3%81%AB%E3%81%AF%E8%AA%B2%E9%A1%8C%E3%82%82">ただし、lib2to3 ベースの CST には課題も</h1>
<ul>
<li>空白・コメントの所有権が曖昧で、ノード削除時に不正なコードが生成される</li>
<li>ノード等の手動管理が必要で、複雑な変換が煩雑</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%81%9D%E3%81%93%E3%81%A7-libcst-%E3%81%AE%E8%AA%95%E7%94%9F">そこで、 LibCST の誕生</h1>
<p>lib2to3 の課題を解決する、Meta（Instagram）発の CST ライブラリ</p>
<ul>
<li><strong>LibCST による改善</strong>: CST の完全性 + AST のような意味的な扱いやすさを両立</li>
<li>Visitor パターンによるコード変換フレームワーク</li>
<li><code>with_changes()</code> による安全な不変ノード操作</li>
<li>Fixit の基盤ライブラリとして利用されている</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<img src="./images/libcst.png" style="width:55%;margin-top:0.5em" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-class="panel-emphasis" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%81%AA%E3%81%9C-libcst-%E3%81%8C%E6%9C%AC%E7%95%AA%E7%92%B0%E5%A2%83%E3%81%A7%E9%87%8D%E8%A6%81%E3%81%AA%E3%81%AE%E3%81%8B">なぜ LibCST が本番環境で重要なのか</h1>
<div class="panel-container">
  <h2>プロダクションコードでは「安全な自動変換」が必須</h2>
  <p>大規模コードベースで自動リファクタリングを行う際、<span class="highlight">コメントやフォーマットが消えるのは許容できない</span>。<br />
  LibCSTを使うことで、<span class="highlight">既存のコードスタイルを維持しながら確実に変換</span>でき、差分レビューもクリーンになる。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="git-diff-%E3%81%8C%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%81%AB%E3%81%AA%E3%82%8B">git diff がクリーンになる</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-diff"># CST ベースの変換なら diff が最小限
<span class="hljs-deletion">- import logging</span>
<span class="hljs-addition">+ import structlog</span>

  # アプリケーションのメインロガー   ← コメント保持
<span class="hljs-deletion">- logger = logging.getLogger(__name__)</span>
<span class="hljs-addition">+ logger = structlog.get_logger()</span>
</code></pre>
<p><strong>変更箇所だけが差分に出る = レビューが楽になる</strong></p>
<p>ASTベースだとファイル全体が書き換わり、差分が膨大になることも</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="04-ai-%E3%81%AB%E3%82%88%E3%82%8B%E3%83%AB%E3%83%BC%E3%83%AB%E8%87%AA%E5%8B%95%E7%94%9F%E6%88%90">04. AI によるルール自動生成</h1>
<h2 id="%E8%87%AA%E7%84%B6%E8%A8%80%E8%AA%9E%E3%81%8B%E3%82%89%E3%82%AB%E3%82%B9%E3%82%BF%E3%83%A0linter%E3%83%AB%E3%83%BC%E3%83%AB%E3%82%92%E7%94%9F%E6%88%90">自然言語からカスタムLinterルールを生成</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-class="rhetorical" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="rhetorical" style="--class:rhetorical;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit%E3%83%AB%E3%83%BC%E3%83%AB%E3%82%92%E6%9B%B8%E3%81%8F%E3%81%AE%E3%81%AF">Fixitルールを書くのは</h1>
<h1 id="%E6%84%8F%E5%A4%96%E3%81%A8%E3%83%8F%E3%83%BC%E3%83%89%E3%83%AB%E3%81%8C%E9%AB%98%E3%81%84">意外とハードルが高い</h1>
<p>libcst の Visitor パターン、CSTノード構造の理解が必要</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%83%AB%E3%83%BC%E3%83%AB%E4%BD%9C%E6%88%90%E3%81%AE%E5%BE%93%E6%9D%A5%E3%81%AE%E3%83%8F%E3%83%BC%E3%83%89%E3%83%AB">ルール作成の従来のハードル</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># libcst のノード構造を理解する必要がある</span>
cst.Import(
    names=[
        cst.ImportAlias(
            name=cst.Attribute(
                value=cst.Name(<span class="hljs-string">&quot;logging&quot;</span>),
                attr=cst.Name(<span class="hljs-string">&quot;getLogger&quot;</span>),
            ),
        ),
    ],
)
</code></pre>
<ul>
<li>CSTノードの種類と階層構造を熟知する必要がある</li>
<li>Visitor パターンの <code>visit_*</code> / <code>leave_*</code> メソッドの使い分け</li>
<li><code>with_changes()</code> による安全なノード変更の書き方</li>
<li><strong>→ 学習コストが高く、すぐには書けない</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-class="steps" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="steps" style="--class:steps;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%82%92%E4%BD%BF%E3%81%A3%E3%81%9F%E3%83%AB%E3%83%BC%E3%83%AB%E7%94%9F%E6%88%90%E3%83%95%E3%83%AD%E3%83%BC">AI を使ったルール生成フロー</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <div class="step-content">
      <h3>自然言語で記述</h3>
      <p>「logging.getLogger の使用を structlog.get_logger に置き換えてほしい」</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <div class="step-content">
      <h3>AI が Fixit ルールを生成</h3>
      <p>libcstのVisitorパターンに基づいたLintRule クラスを自動生成</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">3</div>
    <div class="step-content">
      <h3>コードベース全体に適用</h3>
      <p>fixit fix コマンドで一括自動修正を実行</p>
    </div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-class="panel-gradient" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-gradient" style="--class:panel-gradient;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E4%B8%8B%E3%81%92%E3%82%8B%E3%83%8F%E3%83%BC%E3%83%89%E3%83%AB">AI が下げるハードル</h1>
<div class="panel-container">
  <h2>誰でもカスタムLinterを作れる時代へ</h2>
  <p>libcstの深い知識がなくても、自然言語でやりたいことを説明するだけで、Fixitルールが自動生成される。<br />これにより、チーム全員がコーディング規約の策定と強制に参加できる。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%AB%E6%B8%A1%E3%81%99%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E3%81%AE%E5%B7%A5%E5%A4%AB">AI に渡すコンテキストの工夫</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text"># プロンプトに含めると精度が上がる情報

1. fixit.LintRule の基本構造（テンプレート）
2. libcst の主要ノード型の一覧
3. 変換の Before / After 例
4. エッジケースの具体例
5. 既存の Fixit ルールの実装例
</code></pre>
<p><strong>AI はパターンマッチが得意 → 良い例を与えるほど精度が上がる</strong></p>
<p>既存の Fixit ビルトインルールを参考例として渡すのも効果的</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="05-%E5%AE%9F%E8%B7%B5%E3%83%87%E3%83%A2">05. 実践デモ</h1>
<h2 id="logging-%E2%86%92-structlog-%E7%A7%BB%E8%A1%8C%E3%81%AE%E8%87%AA%E5%8B%95%E5%8C%96">logging → structlog 移行の自動化</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-class="panel-glass" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-glass" style="--class:panel-glass;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%81%AA%E3%81%9C-structlog-%E3%81%AA%E3%81%AE%E3%81%8B">なぜ structlog なのか</h1>
<div class="panel-container">
  <h2>構造化ログへの業界トレンド</h2>
  <p>Python標準の logging モジュールは柔軟だが、構造化ログの出力が煩雑。structlog はキーバリュー形式のログを簡潔に記述でき、JSON出力やログパイプラインとの親和性が高い。多くの組織が移行を進めている。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E5%A4%89%E6%8F%9B%E3%81%AE%E3%82%B4%E3%83%BC%E3%83%AB">変換のゴール</h1>
<p><strong>Before:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> logging

logger = logging.getLogger(__name__)
logger.info(<span class="hljs-string">&quot;User logged in&quot;</span>, extra={<span class="hljs-string">&quot;user_id&quot;</span>: user_id})
</code></pre>
<p><strong>After:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog

logger = structlog.get_logger()
logger.info(<span class="hljs-string">&quot;User logged in&quot;</span>, user_id=user_id)
</code></pre>
<p>import文の変更 + 関数呼び出しの変更を <strong>両方</strong> 自動で行いたい</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai%E3%81%B8%E3%81%AE%E3%83%97%E3%83%AD%E3%83%B3%E3%83%97%E3%83%88%E4%BE%8B">AIへのプロンプト例</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">以下のFixitルールを生成してください:

1. import logging を import structlog に変換
2. logging.getLogger(__name__) を structlog.get_logger() に変換
3. 既存のコメントやフォーマットは保持すること

ルールは fixit.LintRule を継承し、
visit_ImportFrom / visit_Call メソッドで検出、
自動修正（autofix）も実装してください。
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E7%94%9F%E6%88%90%E3%81%97%E3%81%9F-fixit-%E3%83%AB%E3%83%BC%E3%83%AB-13-%E3%82%AF%E3%83%A9%E3%82%B9%E5%AE%9A%E7%BE%A9">AI が生成した Fixit ルール (1/3): クラス定義</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> libcst <span class="hljs-keyword">as</span> cst
<span class="hljs-keyword">from</span> libcst <span class="hljs-keyword">import</span> matchers <span class="hljs-keyword">as</span> m
<span class="hljs-keyword">import</span> fixit

<span class="hljs-keyword">class</span> <span class="hljs-title class_">ReplaceLoggingWithStructlog</span>(fixit.LintRule):
    <span class="hljs-string">&quot;&quot;&quot;logging モジュールの使用を structlog に置き換えるルール&quot;&quot;&quot;</span>

    MESSAGE = <span class="hljs-string">&quot;logging の代わりに structlog を使用してください&quot;</span>
    TAGS = {<span class="hljs-string">&quot;migration&quot;</span>, <span class="hljs-string">&quot;logging&quot;</span>}
</code></pre>
<p>シンプルなクラス定義とメタデータの宣言</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E7%94%9F%E6%88%90%E3%81%97%E3%81%9F-fixit-%E3%83%AB%E3%83%BC%E3%83%AB-23-import-%E6%A4%9C%E5%87%BA">AI が生成した Fixit ルール (2/3): import 検出</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Import</span>(<span class="hljs-params">self, node: cst.Import</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;import logging を検出して import structlog に変換&quot;&quot;&quot;</span>
        <span class="hljs-keyword">if</span> <span class="hljs-built_in">isinstance</span>(node.names, (<span class="hljs-built_in">list</span>, <span class="hljs-built_in">tuple</span>)):
            <span class="hljs-keyword">for</span> i, alias <span class="hljs-keyword">in</span> <span class="hljs-built_in">enumerate</span>(node.names):
                <span class="hljs-keyword">if</span> <span class="hljs-built_in">isinstance</span>(alias.name, cst.Name) \
                   <span class="hljs-keyword">and</span> alias.name.value == <span class="hljs-string">&quot;logging&quot;</span>:
                    new_names = <span class="hljs-built_in">list</span>(node.names)
                    new_names[i] = alias.with_changes(
                        name=cst.Name(<span class="hljs-string">&quot;structlog&quot;</span>)
                    )
                    new_node = node.with_changes(
                        names=new_names
                    )
                    <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)
</code></pre>
<p><code>with_changes()</code> でコメント・空白を保持したままノードを置換</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E7%94%9F%E6%88%90%E3%81%97%E3%81%9F-fixit-%E3%83%AB%E3%83%BC%E3%83%AB-33-%E9%96%A2%E6%95%B0%E5%91%BC%E3%81%B3%E5%87%BA%E3%81%97%E6%A4%9C%E5%87%BA">AI が生成した Fixit ルール (3/3): 関数呼び出し検出</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Call</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;logging.getLogger(__name__) を検出&quot;&quot;&quot;</span>
        <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>._is_logging_get_logger(node):
            new_node = cst.Call(
                func=cst.Attribute(
                    value=cst.Name(<span class="hljs-string">&quot;structlog&quot;</span>),
                    attr=cst.Name(<span class="hljs-string">&quot;get_logger&quot;</span>),
                ),
                args=[],  <span class="hljs-comment"># structlog では引数不要</span>
            )
            <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">_is_logging_get_logger</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-built_in">bool</span>:
        <span class="hljs-keyword">return</span> (
            <span class="hljs-built_in">isinstance</span>(node.func, cst.Attribute)
            <span class="hljs-keyword">and</span> <span class="hljs-built_in">isinstance</span>(node.func.value, cst.Name)
            <span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;logging&quot;</span>
            <span class="hljs-keyword">and</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>
        )
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AE%E3%83%86%E3%82%B9%E3%83%88">ルールのテスト</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># tests/test_replace_logging.py</span>
<span class="hljs-keyword">from</span> fixit <span class="hljs-keyword">import</span> LintRuleTest

<span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-comment"># structlog を使っている正しいコード</span>
        <span class="hljs-string">&quot;import structlog\nlogger = structlog.get_logger()&quot;</span>,
    ]

    INVALID = [
        <span class="hljs-comment"># logging を使っている違反コード</span>
        <span class="hljs-string">&quot;import logging\nlogger = logging.getLogger(__name__)&quot;</span>,
    ]
</code></pre>
<p><strong>Fixit はテストフレームワークも内蔵</strong> → ルールの品質を担保</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%82%B3%E3%83%9E%E3%83%B3%E3%83%89%E3%81%A7%E4%B8%80%E6%8B%AC%E9%81%A9%E7%94%A8">Fixit コマンドで一括適用</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Lint実行 (検出のみ)</span>
$ fixit lint src/
src/auth/service.py:3:1 ReplaceLoggingWithStructlog:
  logging の代わりに structlog を使用してください
src/api/handler.py:5:1 ReplaceLoggingWithStructlog:
  logging の代わりに structlog を使用してください
...Found 23 violations <span class="hljs-keyword">in</span> 23 files.

<span class="hljs-comment"># 自動修正を一括適用</span>
$ fixit fix src/
Fixed 23 files.

<span class="hljs-comment"># 対話的に1つずつ確認</span>
$ fixit fix --interactive src/
</code></pre>
<p><strong>23ファイルの移行が数秒で完了</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-class="compare-conclude" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="compare-conclude" style="--class:compare-conclude;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E5%BE%93%E6%9D%A5%E6%89%8B%E6%B3%95-vs-fixit--ai">従来手法 vs Fixit + AI</h1>
<div class="comparison">
  <div class="compare-col">
    <h3>従来のアプローチ</h3>
    <ul>
      <li>手動で全ファイルを検索・置換</li>
      <li>正規表現では複雑なパターンに対応困難</li>
      <li>コメントや書式が壊れるリスク</li>
      <li>ルール作成に専門知識が必要</li>
    </ul>
  </div>
  <div class="compare-col">
    <h3>Fixit + AI</h3>
    <ul>
      <li>CSTベースで安全な自動変換</li>
      <li>複雑な構文パターンも正確に検出</li>
      <li>コメント・書式を完全に保持</li>
      <li>自然言語からルール生成可能</li>
    </ul>
  </div>
</div>
<div class="conclusion">
  <p>AI + CST で「安全」「高速」「誰でも作れる」カスタムLinterを実現</p>
</div>
</section>

<h2 id="ai%E3%81%8C%E6%9B%B8%E3%81%8F%E3%82%B3%E3%83%BC%E3%83%89%E3%81%AE%E5%93%81%E8%B3%AA%E3%82%92%E3%81%A9%E3%81%86%E5%AE%88%E3%82%8B%E3%81%8B">AIが書くコードの品質をどう守るか</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="06-ai-%E3%81%8C%E6%9B%B8%E3%81%8F%E3%82%B3%E3%83%BC%E3%83%89%E3%81%AE%E5%93%81%E8%B3%AA%E8%AA%B2%E9%A1%8C">06. AI が書くコードの品質課題</h1>
<h2 id="ai-coding-%E6%99%82%E4%BB%A3%E3%81%AE%E6%96%B0%E3%81%9F%E3%81%AA%E3%83%AA%E3%82%B9%E3%82%AF">AI Coding 時代の新たなリスク</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-class="rhetorical" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="rhetorical" style="--class:rhetorical;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E6%9B%B8%E3%81%84%E3%81%9F%E3%82%B3%E3%83%BC%E3%83%89%E3%82%92">AI が書いたコードを</h1>
<h1 id="%E3%81%82%E3%81%AA%E3%81%9F%E3%81%AF%E3%81%A9%E3%81%93%E3%81%BE%E3%81%A7">あなたはどこまで</h1>
<h1 id="%E4%BF%A1%E9%A0%BC%E3%81%97%E3%81%A6%E3%81%84%E3%81%BE%E3%81%99%E3%81%8B">信頼していますか？</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-class="two-col-contrast" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="two-col-contrast" style="--class:two-col-contrast;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-coding-%E3%81%AE%E5%85%89%E3%81%A8%E5%BD%B1">AI Coding の光と影</h1>
<div class="grid">
  <div class="col-left">
    <h2>AI Coding の恩恵</h2>
    <ul>
      <li>コード生成速度の劇的な向上</li>
      <li>ボイラープレートの自動生成</li>
      <li>未知のライブラリでも即座に利用</li>
      <li>自然言語からコード生成</li>
    </ul>
  </div>
  <div class="col-right">
    <h2>見落とされがちなリスク</h2>
    <ul>
      <li>組織の規約を知らないコード</li>
      <li>非推奨パターンの混入</li>
      <li>テストが「通るだけ」の品質</li>
      <li>セキュリティ上の問題</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%81%8C%E7%94%9F%E6%88%90%E3%81%97%E3%81%8C%E3%81%A1%E3%81%AA%E5%95%8F%E9%A1%8C%E3%82%B3%E3%83%BC%E3%83%89">AI が生成しがちな問題コード</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># AI は動くコードを生成するが、組織の規約は知らない</span>

<span class="hljs-keyword">import</span> logging                    <span class="hljs-comment"># ← structlog を使うべき</span>
<span class="hljs-keyword">import</span> requests                   <span class="hljs-comment"># ← 社内HTTPクライアントを使うべき</span>
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime

logger = logging.getLogger(__name__)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>):
    response = requests.get(<span class="hljs-string">f&quot;/api/users/<span class="hljs-subst">{user_id}</span>&quot;</span>) 
    created_at = datetime.now()   <span class="hljs-comment"># ← テスタビリティの問題</span>
    logger.info(<span class="hljs-string">f&quot;Fetched user <span class="hljs-subst">{user_id}</span>&quot;</span>)  <span class="hljs-comment"># ← 構造化ログにすべき</span>
    <span class="hljs-keyword">return</span> response.json()
</code></pre>
<p><strong>動くけど、チームの基準を満たさない</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-class="panel-emphasis" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E6%99%82%E4%BB%A3%E3%81%AB%E3%82%AB%E3%82%B9%E3%82%BF%E3%83%A0linter%E3%81%8C%E9%87%8D%E8%A6%81%E3%81%AA%E7%90%86%E7%94%B1">AI 時代にカスタムLinterが重要な理由</h1>
<div class="panel-container">
  <h2>AIはコードを生成する。Linterはコードを矯正する。</h2>
  <p>AIが書くコード量が増えるほど、<span class="highlight">組織固有の品質基準を自動で強制する仕組み</span>が不可欠になる。<br />
  Fixit のカスタムルールは<span class="highlight">組織やチームごとの規定に合わせて自由にカスタマイズ</span>でき、
  AIが生成したコードに対しても<span class="highlight">人間のレビュアーと同じ指摘を瞬時に行う</span>ことができる。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="07-fixit-%E3%81%AB%E3%82%88%E3%82%8B-ai-%E3%82%B3%E3%83%BC%E3%83%89%E3%81%AE%E5%93%81%E8%B3%AA%E3%82%AC%E3%83%BC%E3%83%89">07. Fixit による AI コードの品質ガード</h1>
<h2 id="%E7%94%9F%E6%88%90%E3%82%B3%E3%83%BC%E3%83%89%E3%81%AB%E3%82%AB%E3%82%B9%E3%82%BF%E3%83%A0%E3%83%AB%E3%83%BC%E3%83%AB%E3%82%92%E9%81%A9%E7%94%A8">生成コードにカスタムルールを適用</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-class="steps" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="steps" style="--class:steps;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-coding--fixit-%E3%81%AE%E3%83%AF%E3%83%BC%E3%82%AF%E3%83%95%E3%83%AD%E3%83%BC">AI Coding + Fixit のワークフロー</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <div class="step-content">
      <h3>AI がコードを生成</h3>
      <p>Copilot / ChatGPT / Claude などでコードを生成</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <div class="step-content">
      <h3>Fixit が即座にチェック</h3>
      <p>カスタムルールで組織規約への違反を自動検出</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">3</div>
    <div class="step-content">
      <h3>自動修正 or 開発者に通知</h3>
      <p>fixit fix で自動修正、または CI で PR をブロック</p>
    </div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E7%94%9F%E6%88%90%E3%82%B3%E3%83%BC%E3%83%89%E3%81%B8%E3%81%AE-fixit-%E9%81%A9%E7%94%A8%E4%BE%8B">AI 生成コードへの Fixit 適用例</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># AI が生成したコードを fixit でチェック</span>
$ fixit lint src/ai_generated/

src/ai_generated/user_service.py:1:1 ReplaceLoggingWithStructlog
  logging の代わりに structlog を使用してください
src/ai_generated/user_service.py:8:5 BanDatetimeNow
  datetime.now() の直接使用は禁止です
src/ai_generated/user_service.py:3:1 BanRequestsLibrary
  requests ではなく社内HTTPクライアントを使用してください

Found 3 violations <span class="hljs-keyword">in</span> 1 file.

<span class="hljs-comment"># 一括自動修正</span>
$ fixit fix src/ai_generated/
Fixed 1 file.
</code></pre>
<p><strong>AI の生成物をチーム基準に自動で矯正</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-class="icon-list" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="icon-list" style="--class:icon-list;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="ai-%E3%82%B3%E3%83%BC%E3%83%89%E5%90%91%E3%81%91%E3%81%AE-fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E4%BE%8B">AI コード向けの Fixit ルール例</h1>
<div class="items">
  <div class="item">
    <div class="item-icon">🚫</div>
    <div>
      <h3>非推奨ライブラリの検出</h3>
      <p>AI は古い情報で requests, urllib3 等を使いがち → 社内クライアントへ自動変換</p>
    </div>
  </div>
  <div class="item">
    <div class="item-icon">🔒</div>
    <div>
      <h3>セキュリティパターンの強制</h3>
      <p>eval() / exec() / pickle.loads() の使用禁止、SQL文字列結合の検出</p>
    </div>
  </div>
  <div class="item">
    <div class="item-icon">📝</div>
    <div>
      <h3>コーディング規約の矯正</h3>
      <p>命名規則、型アノテーション必須、docstring 強制など組織ルールへの適合</p>
    </div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="08-mutmut">08. mutmut</h1>
<h2 id="fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AE%E3%83%86%E3%82%B9%E3%83%88%E3%82%B1%E3%83%BC%E3%82%B9%E3%82%92%E5%BC%B7%E5%8C%96%E3%81%99%E3%82%8B">Fixit ルールのテストケースを強化する</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-class="panel" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel" style="--class:panel;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="mutmut-%E3%81%A8%E3%81%AF">mutmut とは</h1>
<div class="panel-container">
  <div class="panel-header">
    <div class="panel-icon">🧬</div>
    <h2>mutmut - Python Mutation Testing</h2>
  </div>
  <p>コードに意図的な小さな変更（ミュータント）を加え、テストがそれを検出できるかを検証するツール。テストの「本当の品質」を測定する。</p>
  <ul>
    <li>コードカバレッジだけでは分からない<strong>テストの検出力</strong>を計測</li>
    <li>並列実行による高速なミューテーション検証</li>
    <li>対話的UIでミュータント結果をブラウズ可能</li>
    <li>インクリメンタル実行（前回の続きから再開可能）</li>
  </ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-class="center-message" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="center-message" style="--class:center-message;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AE-valid--invalid">Fixit ルールの VALID / INVALID</h1>
<h1 id="%E6%9C%AC%E5%BD%93%E3%81%AB%E5%8D%81%E5%88%86%E3%81%A7%E3%81%99%E3%81%8B">本当に十分ですか？</h1>
<p>ミューテーションテストがテストケースの抜け漏れを明らかにする</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%B9%E3%83%88%E3%81%AE%E3%81%8A%E3%81%95%E3%82%89%E3%81%84">Fixit ルールテストのおさらい</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-string">&quot;import structlog&quot;</span>,                          <span class="hljs-comment"># 正しいimport</span>
    ]

    INVALID = [
        <span class="hljs-string">&quot;import logging&quot;</span>,                            <span class="hljs-comment"># 不正なimport</span>
    ]
</code></pre>
<p><strong>一見十分に見えるが...こんなケースはどうか？</strong></p>
<ul>
<li><code>from logging import getLogger</code> は？</li>
<li><code>import logging as log</code> は？</li>
<li><code>import logging, os</code> は？</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-class="two-col-compare" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="two-col-compare" style="--class:two-col-compare;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%82%AB%E3%83%90%E3%83%AC%E3%83%83%E3%82%B8-vs-%E3%83%9F%E3%83%A5%E3%83%BC%E3%83%86%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%86%E3%82%B9%E3%83%88">カバレッジ vs ミューテーションテスト</h1>
<div class="grid">
  <div class="col-before">
    <h2>コードカバレッジ</h2>
    <ul>
      <li>「テストが通った行」を測定</li>
      <li>行を実行しただけで100%になる</li>
      <li>VALID/INVALID の網羅性は不明</li>
      <li>ルールの条件分岐の漏れは検出不可</li>
    </ul>
  </div>
  <div class="col-after">
    <h2>ミューテーションテスト</h2>
    <ul>
      <li>ルールのコードを変異させて検証</li>
      <li>VALID/INVALID が変異を検出できるか確認</li>
      <li>テストケースの抜け漏れを発見</li>
      <li>ルールの本当の堅牢性が分かる</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="mutmut-%E3%81%8C-fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E3%81%AB%E8%A1%8C%E3%81%86%E3%81%93%E3%81%A8">mutmut が Fixit ルールに行うこと</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 元のルール</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">_is_logging_get_logger</span>(<span class="hljs-params">self, node</span>):
    <span class="hljs-keyword">return</span> (
        <span class="hljs-built_in">isinstance</span>(node.func, cst.Attribute)
        <span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;logging&quot;</span>     <span class="hljs-comment"># ← ここを変異</span>
        <span class="hljs-keyword">and</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>    <span class="hljs-comment"># ← ここも変異</span>
    )
</code></pre>
<p><strong>mutmut が生成するミュータント:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># ミュータント1: 文字列を変更</span>
<span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;XXloggingXX&quot;</span>   <span class="hljs-comment"># &quot;logging&quot; を変更</span>

<span class="hljs-comment"># ミュータント2: 条件を削除</span>
<span class="hljs-keyword">and</span> <span class="hljs-literal">True</span>                                      <span class="hljs-comment"># 条件を常にTrueに</span>

<span class="hljs-comment"># ミュータント3: and を or に変更</span>
<span class="hljs-keyword">or</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>        <span class="hljs-comment"># and → or</span>
</code></pre>
<p><strong>VALID/INVALID がこれらの変異を検出できなければ、テストケース不足</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="mutmut-%E3%81%AE%E4%BD%BF%E3%81%84%E6%96%B9">mutmut の使い方</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Fixit ルールに対してミューテーションテスト実行</span>
$ mutmut run --paths-to-mutate=lint_rules/

<span class="hljs-comment"># 結果の確認</span>
$ mutmut results
Survived <img class="emoji" draggable="false" alt="🙁" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f641.svg" data-marp-twemoji=""/>: 3    ← VALID/INVALID で検出できなかった変異
Killed ✓:   12   ← 正しく検出できた変異
Total:      15
Mutation score: 80%

<span class="hljs-comment"># 生き残ったミュータントの詳細を確認</span>
$ mutmut browse
</code></pre>
<p><strong>Survived = VALID/INVALID に足りないテストケースがある</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="survived-%E3%83%9F%E3%83%A5%E3%83%BC%E3%82%BF%E3%83%B3%E3%83%88%E3%81%8B%E3%82%89%E3%83%86%E3%82%B9%E3%83%88%E3%82%B1%E3%83%BC%E3%82%B9%E3%82%92%E8%BF%BD%E5%8A%A0">Survived ミュータントからテストケースを追加</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># mutmut が発見: &quot;from logging import ...&quot; を検出できていない</span>
<span class="hljs-comment"># → INVALID にケースを追加</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-string">&quot;import structlog&quot;</span>,
        <span class="hljs-string">&quot;from structlog import get_logger&quot;</span>,      <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 追加</span>
        <span class="hljs-string">&quot;import logging_utils&quot;</span>,                   <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 追加: 類似名は許可</span>
    ]

    INVALID = [
        <span class="hljs-string">&quot;import logging&quot;</span>,
        <span class="hljs-string">&quot;from logging import getLogger&quot;</span>,          <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 追加</span>
        <span class="hljs-string">&quot;import logging as log&quot;</span>,                  <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 追加</span>
        <span class="hljs-string">&quot;import os, logging&quot;</span>,                     <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> 追加</span>
    ]
</code></pre>
<p><strong>mutmut の Survived → テストケース追加 → ルールの堅牢性向上</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-class="steps" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="steps" style="--class:steps;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="mutmut-%E3%81%AB%E3%82%88%E3%82%8B-fixit-%E3%83%AB%E3%83%BC%E3%83%AB%E5%BC%B7%E5%8C%96%E3%83%95%E3%83%AD%E3%83%BC">mutmut による Fixit ルール強化フロー</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <div class="step-content">
      <h3>AI が Fixit ルール + VALID/INVALID を生成</h3>
      <p>自然言語から基本的なルールとテストケースを自動生成</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <div class="step-content">
      <h3>mutmut でルールのコードを変異テスト</h3>
      <p>ルール実装のどの部分が VALID/INVALID でカバーされていないかを検出</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">3</div>
    <div class="step-content">
      <h3>Survived ミュータントから VALID/INVALID を補強</h3>
      <p>抜け漏れていたエッジケースをテストに追加し、ルールの品質を担保</p>
    </div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-class="panel-emphasis" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="fixit--mutmut-%E3%81%AE%E7%B5%84%E3%81%BF%E5%90%88%E3%82%8F%E3%81%9B">Fixit + mutmut の組み合わせ</h1>
<div class="panel-container">
  <h2>ルールの品質をルール自身のテストで守る</h2>
  <p><span class="highlight">Fixit</span> = カスタムルールでコード品質を強制する<br />
  <span class="highlight">mutmut</span> = そのルール自体の VALID/INVALID テストケースの網羅性を検証する<br /><br />
  AIが生成したルールとテストケースは「動くけど十分ではない」ことがある。mutmut で<span class="highlight">ルールのテストケースの抜け漏れ</span>を自動検出し、堅牢なカスタムLinterを実現する。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-class="section-start" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="section-start" style="--class:section-start;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="09-cicd-%E7%B5%B1%E5%90%88%E3%81%A8%E9%81%8B%E7%94%A8">09. CI/CD 統合と運用</h1>
<h2 id="%E3%83%81%E3%83%BC%E3%83%A0%E5%85%A8%E4%BD%93%E3%81%A7%E3%81%AE%E6%B4%BB%E7%94%A8%E6%96%B9%E6%B3%95">チーム全体での活用方法</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="cicd-%E3%83%91%E3%82%A4%E3%83%97%E3%83%A9%E3%82%A4%E3%83%B3%E3%81%B8%E3%81%AE%E7%B5%84%E3%81%BF%E8%BE%BC%E3%81%BF">CI/CD パイプラインへの組み込み</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># .github/workflows/quality.yml</span>
<span class="hljs-attr">name:</span> <span class="hljs-string">AI</span> <span class="hljs-string">Code</span> <span class="hljs-string">Quality</span> <span class="hljs-string">Gate</span>
<span class="hljs-attr">on:</span> [<span class="hljs-string">pull_request</span>]

<span class="hljs-attr">jobs:</span>
  <span class="hljs-attr">fixit:</span>
    <span class="hljs-attr">runs-on:</span> <span class="hljs-string">ubuntu-latest</span>
    <span class="hljs-attr">steps:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">uses:</span> <span class="hljs-string">actions/checkout@v4</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">uses:</span> <span class="hljs-string">actions/setup-python@v5</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">pip</span> <span class="hljs-string">install</span> <span class="hljs-string">fixit</span> <span class="hljs-string">mutmut</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">fixit</span> <span class="hljs-string">lint</span> <span class="hljs-string">src/</span>                <span class="hljs-comment"># コード品質チェック</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">mutmut</span> <span class="hljs-string">run</span> <span class="hljs-string">--CI</span>               <span class="hljs-comment"># テスト品質チェック</span>
</code></pre>
<p><strong>PRごとにコード品質 + テスト品質を自動検証</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-class="steps-horizontal" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="steps-horizontal" style="--class:steps-horizontal;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%83%81%E3%83%BC%E3%83%A0%E3%81%B8%E3%81%AE%E5%B0%8E%E5%85%A5%E3%82%B9%E3%83%86%E3%83%83%E3%83%97">チームへの導入ステップ</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <h3>ルール策定</h3>
    <p>チーム規約を整理</p>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <h3>AI生成</h3>
    <p>Fixitルールを生成</p>
  </div>
  <div class="step">
    <div class="step-number">3</div>
    <h3>mutmut</h3>
    <p>テスト品質を検証</p>
  </div>
  <div class="step">
    <div class="step-number">4</div>
    <h3>一括適用</h3>
    <p>既存コードを修正</p>
  </div>
  <div class="step">
    <div class="step-number">5</div>
    <h3>CI統合</h3>
    <p>自動チェック開始</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" style="--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%83%97%E3%83%AD%E3%82%B8%E3%82%A7%E3%82%AF%E3%83%88%E6%A7%8B%E6%88%90%E3%81%AE%E4%BE%8B">プロジェクト構成の例</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>my-project/
├── src/
│   ├── auth/
│   ├── api/
│   └── ...
├── lint_rules/                    # Fixit カスタムルール
│   ├── __init__.py
│   ├── replace_logging.py         # logging → structlog
│   ├── ban_datetime_now.py        # datetime.now() 禁止
│   └── require_base_exception.py  # カスタム例外規約
├── tests/
│   └── ...
├── .fixit.toml                    # Fixit 設定
├── setup.cfg                      # mutmut 設定
└── pyproject.toml
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-class="timeline" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="timeline" style="--class:timeline;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E5%AE%9F%E9%9A%9B%E3%81%AE%E5%B0%8E%E5%85%A5%E3%82%BF%E3%82%A4%E3%83%A0%E3%83%A9%E3%82%A4%E3%83%B3%E4%BE%8B">実際の導入タイムライン例</h1>
<div class="timeline-list">
  <div class="timeline-item">
    <div class="timeline-date">Day 1</div>
    <h3>規約の整理とルール設計</h3>
    <p>チームのコーディング規約を棚卸しし、自動化すべきルールを決定</p>
  </div>
  <div class="timeline-item">
    <div class="timeline-date">Day 2-3</div>
    <h3>AI でルール生成 & テスト</h3>
    <p>自然言語からFixitルールを生成し、テストケースで動作確認</p>
  </div>
  <div class="timeline-item">
    <div class="timeline-date">Day 4</div>
    <h3>既存コードへの一括適用 & mutmut 実行</h3>
    <p>fixit fix で修正、mutmut でテスト品質のベースライン測定</p>
  </div>
  <div class="timeline-item">
    <div class="timeline-date">Day 5</div>
    <h3>CI/CD 統合</h3>
    <p>GitHub Actions に Fixit + mutmut を組み込み、自動チェック開始</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-class="qa" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="qa" style="--class:qa;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%82%88%E3%81%8F%E3%81%82%E3%82%8B%E8%B3%AA%E5%95%8F">よくある質問</h1>
<div class="qa-item">
  <div class="question">
    <div class="q-label">Q</div>
    <p>AI が生成したルールはそのまま使えますか？</p>
  </div>
  <div class="answer">
    <div class="a-label">A</div>
    <p>基本的にはそのまま動作しますが、エッジケースのテストは必要です。Fixitの内蔵テストフレームワークで VALID/INVALID パターンを検証してから本番適用してください。</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-class="qa" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="qa" style="--class:qa;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%82%88%E3%81%8F%E3%81%82%E3%82%8B%E8%B3%AA%E5%95%8F-1">よくある質問</h1>
<div class="qa-item">
  <div class="question">
    <div class="q-label">Q</div>
    <p>mutmut は実行時間が長くないですか？</p>
  </div>
  <div class="answer">
    <div class="a-label">A</div>
    <p>並列実行とインクリメンタル実行に対応しているので、初回以降は差分のみ検証できます。CI では変更されたファイルのみを対象にするのが実用的です。</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-class="summary-glass" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="summary-glass" style="--class:summary-glass;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="%E3%81%BE%E3%81%A8%E3%82%81">まとめ</h1>
<div class="summary-items">
  <div class="summary-item">
    <div class="summary-number">1</div>
    <div class="summary-text">Part 1: AI でカスタムLinterルールを自然言語から生成し、コードベース全体に適用</div>
  </div>
  <div class="summary-item">
    <div class="summary-number">2</div>
    <div class="summary-text">Part 2: AI が書いたコードの品質を Fixit で、テスト品質を mutmut で守る</div>
  </div>
  <div class="summary-item">
    <div class="summary-number">3</div>
    <div class="summary-text">Fixit + LibCST による安全な自動変換で、書式・コメントを完全に保持</div>
  </div>
  <div class="summary-item">
    <div class="summary-number">4</div>
    <div class="summary-text">CI/CD に統合すれば、AI Coding 時代でもコード品質を継続的に自動で守れる</div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-class="panel-gradient" data-theme="1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud" lang="C" class="panel-gradient" style="--class:panel-gradient;--theme:1w3i9uxbkku6s94hqne98rh2z86nlx1es6r1zpqdoud;">
<h1 id="next-step-%E4%BB%8A%E6%97%A5%E3%81%8B%E3%82%89%E5%A7%8B%E3%82%81%E3%81%A6%E3%81%BF%E3%82%88%E3%81%86">Next Step: 今日から始めてみよう</h1>
<div class="panel-container">
  <h2>3ステップで始められます</h2>
  <p>
    1. pip install fixit mutmut でインストール<br />
    2. チームの規約を1つ選んで AI にルール生成を依頼<br />
    3. fixit fix で既存コードに適用、mutmut run でテスト品質を確認
  </p>
</div>
</section>
