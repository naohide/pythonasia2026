</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-class="rhetorical" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="rhetorical" style="--class:rhetorical;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-class="two-col-contrast" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="two-col-contrast" style="--class:two-col-contrast;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-reality-of-code-reviews">The Reality of Code Reviews</h1>
<div class="grid">
  <div class="col-left">
    <h2>Common Problems</h2>
    <ul>
      <li>Team-specific conventions become tacit knowledge</li>
      <li>Review quality depends on individual reviewers</li>
      <li>Review feedback tends to be subjective</li>
      <li>Slow onboarding of new members to conventions</li>
    </ul>
  </div>
  <div class="col-right">
    <h2>The Ideal State</h2>
    <ul>
      <li>Coding standards are explicitly documented</li>
      <li>Conventions are verified mechanically</li>
      <li>Objective and consistent feedback</li>
      <li>Automatically enforced via CI/CD</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="a-common-scenario-in-practice">A Common Scenario in Practice</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># During a PR review...</span>

<span class="hljs-comment"># Reviewer A: &quot;Please use structlog instead of logging&quot;</span>
<span class="hljs-keyword">import</span> logging
logger = logging.getLogger(__name__)

<span class="hljs-comment"># Reviewer B: &quot;Oh, I didn&#x27;t know about that...&quot;</span>
<span class="hljs-comment"># Reviewer C: &quot;This wasn&#x27;t flagged in the last PR...&quot;</span>
</code></pre>
<p><strong>The same feedback repeated over and over = an opportunity for automation</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-class="three-col" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="three-col" style="--class:three-col;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="3-problems-custom-linters-solve">3 Problems Custom Linters Solve</h1>
<div class="grid">
  <div class="col">
    <div class="col-icon">1</div>
    <h3>Eliminating Subjectivity</h3>
    <p>Define coding conventions as machine-enforceable rules to prevent reviewer-dependent reviews</p>
    <img src="./images/objectivity.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-icon">2</div>
    <h3>Enforcing Best Practices</h3>
    <p>Automatically apply the organization's "ideal patterns" across the entire codebase</p>
    <img src="./images/ideal-pattern.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-icon">3</div>
    <h3>From Human to Machine</h3>
    <p>Shift from human-dependent review processes to automated machine verification</p>
    <img src="./images/automation.svg" style="width:100%;margin-top:0.5em" />
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;--marpit-advanced-background-split:40%;" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;https://raw.githubusercontent.com/astral-sh/ruff/main/assets/badge/v2/ruff.svg&quot;);background-size:80%;"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="11" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;--marpit-advanced-background-split:40%;" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="limitations-of-general-purpose-linters">Limitations of General-Purpose Linters</h1>

<p><strong>ruff, flake8, pylint</strong> and other general-purpose linters are excellent, but...</p>
<ul>
<li>They only provide generic rules</li>
<li>Cannot address organization-specific requirements</li>
<li>e.g., &quot;Use structlog instead of the logging module&quot;</li>
<li>e.g., &quot;Always apply a specific decorator&quot;</li>
<li>e.g., &quot;Prohibit usage of deprecated APIs&quot;</li>
</ul>
<p><strong>Custom rules are essential to enforce organization-specific coding standards</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-class="panel-emphasis" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="examples-of-organization-specific-rules">Examples of Organization-Specific Rules</h1>
<div class="panel-container">
  <h2>Rules that general-purpose linters cannot detect</h2>
  <p>
    Enforcing <span class="highlight">logging → structlog</span> migration<br />
    Prohibiting direct use of <span class="highlight">datetime.now()</span> (for testability)<br />
    Requiring internal HTTP client instead of <span class="highlight">requests</span><br />
    Prohibiting custom exceptions that don't inherit from a specific base class<br />
    Detecting code that calls deprecated internal APIs
  </p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="02-what-is-fixit">02. What Is Fixit</h1>
<h2 id="a-python-lint-framework-born-at-instagram">A Python Lint Framework Born at Instagram</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-class="panel" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel" style="--class:panel;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="fixit-overview">Fixit Overview</h1>
<div class="panel-container">
  <div class="panel-header">
    <div class="panel-icon">🔧</div>
    <h2>Instagram/Fixit</h2>
  </div>
  <p>A powerful Python lint framework based on <strong>libcst</strong>. Easy to create custom rules with built-in autofix capabilities.</p>
  <ul>
    <li>Precise syntax analysis using <strong>libcst</strong> (CST = Concrete Syntax Tree)</li>
    <li>Place custom rules directly in your repository</li>
    <li>Interactive review or bulk autofix of suggested fixes</li>
    <li>Hierarchical configuration management (project/directory/file level)</li>
  </ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-class="four-col" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="four-col" style="--class:four-col;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="key-features-of-fixit">Key Features of Fixit</h1>
<div class="grid">
  <div class="col">
    <div class="col-number">Lint</div>
    <h3>Detection</h3>
    <p>Detect and report rule violations</p>
    <img src="./images/lint-detect.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Fix</div>
    <h3>Autofix</h3>
    <p>Automatically fix detected issues</p>
    <img src="./images/auto-fix.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Local</div>
    <h3>Local Rules</h3>
    <p>Place rules in your repository</p>
    <img src="./images/local-rules.svg" style="width:100%;margin-top:0.5em" />
  </div>
  <div class="col">
    <div class="col-number">Config</div>
    <h3>Hierarchical Config</h3>
    <p>Per-directory configuration</p>
    <img src="./images/hierarchy-config.svg" style="width:100%;margin-top:0.5em" />
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="basic-usage-of-fixit">Basic Usage of Fixit</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Configure in .fixit.toml</span>
[fixit]
local = [<span class="hljs-string">&quot;lint_rules/&quot;</span>]    <span class="hljs-comment"># Custom rules directory</span>

<span class="hljs-comment"># Run commands</span>
$ pip install fixit                   <span class="hljs-comment"># Install</span>
$ fixit lint path/to/code.py          <span class="hljs-comment"># Run linting</span>
$ fixit fix path/to/code.py           <span class="hljs-comment"># Autofix</span>
$ fixit fix --interactive path/       <span class="hljs-comment"># Interactive fix</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="basic-structure-of-a-fixit-rule">Basic Structure of a Fixit Rule</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> libcst <span class="hljs-keyword">as</span> cst
<span class="hljs-keyword">import</span> fixit

<span class="hljs-keyword">class</span> <span class="hljs-title class_">MyRule</span>(fixit.LintRule):
    <span class="hljs-string">&quot;&quot;&quot;Description of the rule&quot;&quot;&quot;</span>
    MESSAGE = <span class="hljs-string">&quot;Description of the issue&quot;</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Call</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;Visit specific nodes for inspection&quot;&quot;&quot;</span>
        <span class="hljs-comment"># Inspect node and report violation</span>
        <span class="hljs-variable language_">self</span>.report(node, message=<span class="hljs-string">&quot;Fix required&quot;</span>)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Import</span>(<span class="hljs-params">self, node: cst.Import</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;Inspect import statements&quot;&quot;&quot;</span>
        <span class="hljs-comment"># Specifying replacement enables autofix</span>
        <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)
</code></pre>
<p><strong>Visitor Pattern</strong>: Traverses each node in the tree for inspection</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="fixit-configuration-file">Fixit Configuration File</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-toml"><span class="hljs-comment"># .fixit.toml - Place in the project root</span>

<span class="hljs-section">[fixit]</span>
<span class="hljs-comment"># Custom rules directory</span>
<span class="hljs-attr">local</span> = [<span class="hljs-string">&quot;lint_rules/&quot;</span>]

<span class="hljs-comment"># Rules to enable</span>
<span class="hljs-attr">enable</span> = [<span class="hljs-string">&quot;fixit.rules&quot;</span>, <span class="hljs-string">&quot;lint_rules&quot;</span>]

<span class="hljs-comment"># Rules to disable</span>
<span class="hljs-attr">disable</span> = [<span class="hljs-string">&quot;fixit.rules:CompareSingletonPrimitivesByIs&quot;</span>]

<span class="hljs-comment"># Python version</span>
<span class="hljs-attr">python-version</span> = <span class="hljs-string">&quot;3.14&quot;</span>
</code></pre>
<p>Place a separate <code>.fixit.toml</code> in subdirectories for <strong>hierarchical configuration</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="03-ast-vs-cst">03. AST vs CST</h1>
<h2 id="why-the-concrete-syntax-tree-matters">Why the Concrete Syntax Tree Matters</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-class="center-message" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="center-message" style="--class:center-message;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="two-approaches-to">Two Approaches to</h1>
<h1 id="understanding-source-code">&quot;Understanding&quot; Source Code</h1>
<p>AST (Abstract Syntax Tree) vs CST (Concrete Syntax Tree)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-class="two-col-compare" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="two-col-compare" style="--class:two-col-compare;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ast-vs-cst-the-difference">AST vs CST: The Difference</h1>
<div class="grid">
  <div class="col-before">
    <h2>AST (Abstract Syntax Tree)</h2>
    <ul>
      <li>Retains only structural information</li>
      <li>Comments are lost</li>
      <li>Whitespace and newlines are lost</li>
      <li>Formatting is lost</li>
    </ul>
    <img src="./images/ast.png" style="width:70%;margin-top:0.5em" />
  </div>
  <div class="col-after">
    <h2>CST (Concrete Syntax Tree)</h2>
    <ul>
      <li>Retains structure + formatting info</li>
      <li>Comments are preserved</li>
      <li>Whitespace and newlines are preserved</li>
      <li>Original formatting is maintained</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ast-basics">AST Basics</h1>
<img src="./images/ast.png" style="width:70%;margin-top:0.5em" />
<p><strong>AST extracts only the &quot;meaning&quot; of code and discards the &quot;appearance&quot;</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-ast-problem-information-lost-during-transformation">The AST Problem: Information Lost During Transformation</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Original code</span>
<span class="hljs-keyword">import</span> logging  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># Application&#x27;s main logger</span>
logger = logging.getLogger(__name__)
</code></pre>
<p><strong>When transformed with AST...</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog
logger = structlog.get_logger()
</code></pre>
<p>Comments are lost, along with the team's notes and intentions</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="cst-basics">CST Basics</h1>
<img src="./images/cst.png" style="width:60%;margin-top:0.5em" />
<p><strong>CST represents code in a &quot;fully recoverable form&quot;</strong></p>
<p>However, lib2to3 was removed in Python 3.13 → a successor is needed</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-cst-advantage-fully-preserving-original-style">The CST Advantage: Fully Preserving Original Style</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Original code</span>
<span class="hljs-keyword">import</span> logging  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># Application&#x27;s main logger</span>
logger = logging.getLogger(__name__)
</code></pre>
<p><strong>When transformed with CST...</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog  <span class="hljs-comment"># Legacy logging</span>

<span class="hljs-comment"># Application&#x27;s main logger</span>
logger = structlog.get_logger()
</code></pre>
<p>Safe transformation while preserving comments, whitespace, and formatting</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="however-lib2to3-based-cst-has-its-own-issues">However, lib2to3-Based CST Has Its Own Issues</h1>
<ul>
<li>Ambiguous ownership of whitespace and comments, leading to invalid code when deleting nodes</li>
<li>Manual management of nodes is required, making complex transformations cumbersome</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="enter-libcst">Enter LibCST</h1>
<p>A CST library from Meta (Instagram) that solves the issues of lib2to3</p>
<ul>
<li><strong>LibCST's Improvement</strong>: Combines CST completeness with AST-like semantic usability</li>
<li>Code transformation framework based on the Visitor pattern</li>
<li>Safe immutable node operations via <code>with_changes()</code></li>
<li>Used as the foundational library for Fixit</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<img src="./images/libcst.png" style="width:55%;margin-top:0.5em" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-class="panel-emphasis" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="why-libcst-matters-in-production">Why LibCST Matters in Production</h1>
<div class="panel-container">
  <h2>"Safe automatic transformation" is essential for production code</h2>
  <p>When performing automated refactoring on large codebases, <span class="highlight">losing comments or formatting is unacceptable</span>.<br />
  With LibCST, you can <span class="highlight">transform code reliably while preserving the existing code style</span>, resulting in clean diffs for review.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="clean-git-diffs">Clean git diffs</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-diff"># CST-based transformation keeps diffs minimal
<span class="hljs-deletion">- import logging</span>
<span class="hljs-addition">+ import structlog</span>

  # Application&#x27;s main logger   ← Comment preserved
<span class="hljs-deletion">- logger = logging.getLogger(__name__)</span>
<span class="hljs-addition">+ logger = structlog.get_logger()</span>
</code></pre>
<p><strong>Only the changed parts appear in the diff = easier reviews</strong></p>
<p>With AST-based approaches, entire files get rewritten, leading to massive diffs</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="04-ai-powered-rule-generation">04. AI-Powered Rule Generation</h1>
<h2 id="generating-custom-linter-rules-from-natural-language">Generating Custom Linter Rules from Natural Language</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-class="rhetorical" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="rhetorical" style="--class:rhetorical;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="writing-fixit-rules">Writing Fixit rules</h1>
<h1 id="is-surprisingly">is surprisingly</h1>
<h1 id="challenging">challenging</h1>
<p>Requires understanding libcst's Visitor pattern and CST node structure</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-traditional-barrier-to-rule-creation">The Traditional Barrier to Rule Creation</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># You need to understand libcst&#x27;s node structure</span>
cst.Import(
    names=[
        cst.ImportAlias(
            name=cst.Attribute(
                value=cst.Name(<span class="hljs-string">&quot;logging&quot;</span>),
                attr=cst.Name(<span class="hljs-string">&quot;getLogger&quot;</span>),
            ),
        ),
    ],
)
</code></pre>
<ul>
<li>Deep knowledge of CST node types and hierarchy is required</li>
<li>Understanding <code>visit_*</code> / <code>leave_*</code> method usage in the Visitor pattern</li>
<li>Writing safe node modifications with <code>with_changes()</code></li>
<li><strong>→ High learning curve, can't write rules right away</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-class="steps" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="steps" style="--class:steps;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-class="panel-gradient" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-gradient" style="--class:panel-gradient;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="tips-for-providing-context-to-ai">Tips for Providing Context to AI</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text"># Information that improves accuracy when included in prompts

1. Basic structure of fixit.LintRule (template)
2. List of key libcst node types
3. Before / After transformation examples
4. Specific edge case examples
5. Implementation examples of existing Fixit rules
</code></pre>
<p><strong>AI excels at pattern matching → better examples lead to better accuracy</strong></p>
<p>Passing existing Fixit built-in rules as reference examples is also effective</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="05-live-demo">05. Live Demo</h1>
<h2 id="automating-the-logging-%E2%86%92-structlog-migration">Automating the logging → structlog Migration</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-class="panel-glass" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-glass" style="--class:panel-glass;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="why-structlog">Why structlog?</h1>
<div class="panel-container">
  <h2>Industry Trend Toward Structured Logging</h2>
  <p>Python's standard logging module is flexible but cumbersome for structured log output. structlog enables concise key-value format logging with excellent compatibility with JSON output and log pipelines. Many organizations are making the switch.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-transformation-goal">The Transformation Goal</h1>
<p><strong>Before:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> logging

logger = logging.getLogger(__name__)
logger.info(<span class="hljs-string">&quot;User logged in&quot;</span>, extra={<span class="hljs-string">&quot;user_id&quot;</span>: user_id})
</code></pre>
<p><strong>After:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> structlog

logger = structlog.get_logger()
logger.info(<span class="hljs-string">&quot;User logged in&quot;</span>, user_id=user_id)
</code></pre>
<p>We want to automatically handle <strong>both</strong> the import change and the function call change</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="example-prompt-for-ai">Example Prompt for AI</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Please generate the following Fixit rule:

1. Transform import logging to import structlog
2. Transform logging.getLogger(__name__) to structlog.get_logger()
3. Preserve existing comments and formatting

The rule should inherit from fixit.LintRule,
detect using visit_ImportFrom / visit_Call methods,
and implement autofix.
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ai-generated-fixit-rule-13-class-definition">AI-Generated Fixit Rule (1/3): Class Definition</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> libcst <span class="hljs-keyword">as</span> cst
<span class="hljs-keyword">from</span> libcst <span class="hljs-keyword">import</span> matchers <span class="hljs-keyword">as</span> m
<span class="hljs-keyword">import</span> fixit

<span class="hljs-keyword">class</span> <span class="hljs-title class_">ReplaceLoggingWithStructlog</span>(fixit.LintRule):
    <span class="hljs-string">&quot;&quot;&quot;Rule to replace logging module usage with structlog&quot;&quot;&quot;</span>

    MESSAGE = <span class="hljs-string">&quot;Use structlog instead of logging&quot;</span>
    TAGS = {<span class="hljs-string">&quot;migration&quot;</span>, <span class="hljs-string">&quot;logging&quot;</span>}
</code></pre>
<p>Simple class definition and metadata declaration</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ai-generated-fixit-rule-23-import-detection">AI-Generated Fixit Rule (2/3): Import Detection</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Import</span>(<span class="hljs-params">self, node: cst.Import</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;Detect import logging and transform to import structlog&quot;&quot;&quot;</span>
        <span class="hljs-keyword">if</span> <span class="hljs-built_in">isinstance</span>(node.names, (<span class="hljs-built_in">list</span>, <span class="hljs-built_in">tuple</span>)):
            <span class="hljs-keyword">for</span> i, alias <span class="hljs-keyword">in</span> <span class="hljs-built_in">enumerate</span>(node.names):
                <span class="hljs-keyword">if</span> <span class="hljs-built_in">isinstance</span>(alias.name, cst.Name) \
                   <span class="hljs-keyword">and</span> alias.name.value == <span class="hljs-string">&quot;logging&quot;</span>:
                    new_names = <span class="hljs-built_in">list</span>(node.names)
                    new_names[i] = alias.with_changes(
                        name=cst.Name(<span class="hljs-string">&quot;structlog&quot;</span>)
                    )
                    new_node = node.with_changes(
                        names=new_names
                    )
                    <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)
</code></pre>
<p><code>with_changes()</code> replaces the node while preserving comments and whitespace</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ai-generated-fixit-rule-33-function-call-detection">AI-Generated Fixit Rule (3/3): Function Call Detection</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">visit_Call</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-literal">None</span>:
        <span class="hljs-string">&quot;&quot;&quot;Detect logging.getLogger(__name__)&quot;&quot;&quot;</span>
        <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>._is_logging_get_logger(node):
            new_node = cst.Call(
                func=cst.Attribute(
                    value=cst.Name(<span class="hljs-string">&quot;structlog&quot;</span>),
                    attr=cst.Name(<span class="hljs-string">&quot;get_logger&quot;</span>),
                ),
                args=[],  <span class="hljs-comment"># No arguments needed for structlog</span>
            )
            <span class="hljs-variable language_">self</span>.report(node, replacement=new_node)

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">_is_logging_get_logger</span>(<span class="hljs-params">self, node: cst.Call</span>) -&gt; <span class="hljs-built_in">bool</span>:
        <span class="hljs-keyword">return</span> (
            <span class="hljs-built_in">isinstance</span>(node.func, cst.Attribute)
            <span class="hljs-keyword">and</span> <span class="hljs-built_in">isinstance</span>(node.func.value, cst.Name)
            <span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;logging&quot;</span>
            <span class="hljs-keyword">and</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>
        )
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="testing-the-rule">Testing the Rule</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># tests/test_replace_logging.py</span>
<span class="hljs-keyword">from</span> fixit <span class="hljs-keyword">import</span> LintRuleTest

<span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-comment"># Correct code using structlog</span>
        <span class="hljs-string">&quot;import structlog\nlogger = structlog.get_logger()&quot;</span>,
    ]

    INVALID = [
        <span class="hljs-comment"># Violating code using logging</span>
        <span class="hljs-string">&quot;import logging\nlogger = logging.getLogger(__name__)&quot;</span>,
    ]
</code></pre>
<p><strong>Fixit includes a built-in test framework</strong> → ensuring rule quality</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="bulk-application-with-fixit-commands">Bulk Application with Fixit Commands</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Lint run (detection only)</span>
$ fixit lint src/
src/auth/service.py:3:1 ReplaceLoggingWithStructlog:
  Use structlog instead of logging
src/api/handler.py:5:1 ReplaceLoggingWithStructlog:
  Use structlog instead of logging
...Found 23 violations <span class="hljs-keyword">in</span> 23 files.

<span class="hljs-comment"># Apply autofix in bulk</span>
$ fixit fix src/
Fixed 23 files.

<span class="hljs-comment"># Interactive one-by-one review</span>
$ fixit fix --interactive src/
</code></pre>
<p><strong>Migration of 23 files completed in seconds</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-class="compare-conclude" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="compare-conclude" style="--class:compare-conclude;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

      <li>Manually search and replace across all files</li>
      <li>Regex struggles with complex patterns</li>
      <li>Risk of breaking comments and formatting</li>
      <li>Requires expert knowledge to create rules</li>
    </ul>
  </div>
  <div class="compare-col">
    <h3>Fixit + AI</h3>
    <ul>
      <li>Safe automatic transformation with CST</li>
      <li>Accurately detects complex syntax patterns</li>
      <li>Fully preserves comments and formatting</li>
      <li>Generate rules from natural language</li>
    </ul>
  </div>
</div>
<div class="conclusion">
  <p>AI + CST enables "safe," "fast," and "anyone can create" custom linters</p>
</div>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-class="rhetorical" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="rhetorical" style="--class:rhetorical;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="how-much-do-you">How much do you</h1>
<h1 id="trust-the-code">trust the code</h1>
<h1 id="written-by-ai">written by AI?</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-class="two-col-contrast" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="two-col-contrast" style="--class:two-col-contrast;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-light-and-shadow-of-ai-coding">The Light and Shadow of AI Coding</h1>
<div class="grid">
  <div class="col-left">
    <h2>Benefits of AI Coding</h2>
    <ul>
      <li>Dramatic improvement in code generation speed</li>
      <li>Automatic boilerplate generation</li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="problematic-code-ai-tends-to-generate">Problematic Code AI Tends to Generate</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># AI generates working code, but doesn&#x27;t know your org&#x27;s conventions</span>

<span class="hljs-keyword">import</span> logging                    <span class="hljs-comment"># ← Should use structlog</span>
<span class="hljs-keyword">import</span> requests                   <span class="hljs-comment"># ← Should use internal HTTP client</span>
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime

logger = logging.getLogger(__name__)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>):
    response = requests.get(<span class="hljs-string">f&quot;/api/users/<span class="hljs-subst">{user_id}</span>&quot;</span>)
    created_at = datetime.now()   <span class="hljs-comment"># ← Testability issue</span>
    logger.info(<span class="hljs-string">f&quot;Fetched user <span class="hljs-subst">{user_id}</span>&quot;</span>)  <span class="hljs-comment"># ← Should use structured logging</span>
    <span class="hljs-keyword">return</span> response.json()
</code></pre>
<p><strong>It works, but doesn't meet the team's standards</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-class="panel-emphasis" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="why-custom-linters-matter-in-the-ai-era">Why Custom Linters Matter in the AI Era</h1>
<div class="panel-container">
  <h2>AI generates code. Linters correct code.</h2>
  <p>As the volume of AI-generated code increases, <span class="highlight">automated enforcement of organization-specific quality standards</span> becomes essential.<br />
  Fixit's custom rules can be <span class="highlight">freely customized to match each organization's or team's standards</span>,
  enabling <span class="highlight">instant feedback on AI-generated code, just like a human reviewer</span>.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="07-guarding-ai-code-quality-with-fixit">07. Guarding AI Code Quality with Fixit</h1>
<h2 id="applying-custom-rules-to-generated-code">Applying Custom Rules to Generated Code</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-class="steps" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="steps" style="--class:steps;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="ai-coding--fixit-workflow">AI Coding + Fixit Workflow</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <div class="step-content">
      <h3>AI Generates Code</h3>
      <p>Generate code with Copilot / ChatGPT / Claude, etc.</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <div class="step-content">
      <h3>Fixit Checks Instantly</h3>
      <p>Custom rules automatically detect violations of organizational standards</p>
    </div>
  </div>
  <div class="step">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="08-mutmut">08. mutmut</h1>
<h2 id="strengthening-fixit-rule-test-cases">Strengthening Fixit Rule Test Cases</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-class="panel" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel" style="--class:panel;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="what-is-mutmut">What Is mutmut</h1>
<div class="panel-container">
  <div class="panel-header">
    <div class="panel-icon">🧬</div>
    <h2>mutmut - Python Mutation Testing</h2>
  </div>
  <p>A tool that introduces intentional small changes (mutants) to code and verifies whether tests can detect them. It measures the "true quality" of your tests.</p>
  <ul>
    <li>Measures <strong>test detection capability</strong> that code coverage alone cannot reveal</li>
    <li>Fast mutation verification through parallel execution</li>
    <li>Interactive UI to browse mutant results</li>
    <li>Incremental execution (resume from where you left off)</li>
  </ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-class="center-message" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="center-message" style="--class:center-message;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="are-the-valid--invalid-cases">Are the VALID / INVALID cases</h1>
<h1 id="in-your-fixit-rules-really-enough">in your Fixit rules really enough?</h1>
<p>Mutation testing reveals gaps in your test cases</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="a-quick-review-of-fixit-rule-testing">A Quick Review of Fixit Rule Testing</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-string">&quot;import structlog&quot;</span>,                          <span class="hljs-comment"># Correct import</span>
    ]

    INVALID = [
        <span class="hljs-string">&quot;import logging&quot;</span>,                            <span class="hljs-comment"># Violating import</span>
    ]
</code></pre>
<p><strong>Looks sufficient at first glance, but... what about these cases?</strong></p>
<ul>
<li>What about <code>from logging import getLogger</code>?</li>
<li>What about <code>import logging as log</code>?</li>
<li>What about <code>import logging, os</code>?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-class="two-col-compare" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="two-col-compare" style="--class:two-col-compare;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="coverage-vs-mutation-testing">Coverage vs Mutation Testing</h1>
<div class="grid">
  <div class="col-before">
    <h2>Code Coverage</h2>
    <ul>
      <li>Measures "lines executed by tests"</li>
      <li>Can reach 100% by just executing lines</li>
      <li>VALID/INVALID completeness is unknown</li>
      <li>Cannot detect missing rule conditions</li>
    </ul>
  </div>
  <div class="col-after">
    <h2>Mutation Testing</h2>
    <ul>
      <li>Mutates the rule's code for verification</li>
      <li>Checks if VALID/INVALID can detect mutations</li>
      <li>Discovers missing test cases</li>
      <li>Reveals the true robustness of rules</li>
    </ul>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="what-mutmut-does-to-fixit-rules">What mutmut Does to Fixit Rules</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Original rule</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">_is_logging_get_logger</span>(<span class="hljs-params">self, node</span>):
    <span class="hljs-keyword">return</span> (
        <span class="hljs-built_in">isinstance</span>(node.func, cst.Attribute)
        <span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;logging&quot;</span>     <span class="hljs-comment"># ← Mutated here</span>
        <span class="hljs-keyword">and</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>    <span class="hljs-comment"># ← Mutated here too</span>
    )
</code></pre>
<p><strong>Mutants generated by mutmut:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Mutant 1: Change the string</span>
<span class="hljs-keyword">and</span> node.func.value.value == <span class="hljs-string">&quot;XXloggingXX&quot;</span>   <span class="hljs-comment"># &quot;logging&quot; changed</span>

<span class="hljs-comment"># Mutant 2: Remove the condition</span>
<span class="hljs-keyword">and</span> <span class="hljs-literal">True</span>                                      <span class="hljs-comment"># Condition always True</span>

<span class="hljs-comment"># Mutant 3: Change and to or</span>
<span class="hljs-keyword">or</span> node.func.attr.value == <span class="hljs-string">&quot;getLogger&quot;</span>        <span class="hljs-comment"># and → or</span>
</code></pre>
<p><strong>If VALID/INVALID can't detect these mutations, test cases are insufficient</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="how-to-use-mutmut">How to Use mutmut</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Run mutation testing on Fixit rules</span>
$ mutmut run --paths-to-mutate=lint_rules/

<span class="hljs-comment"># Check results</span>
$ mutmut results
Survived <img class="emoji" draggable="false" alt="🙁" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f641.svg" data-marp-twemoji=""/>: 3    ← Mutations not detected by VALID/INVALID
Killed ✓:   12   ← Correctly detected mutations
Total:      15
Mutation score: 80%

<span class="hljs-comment"># View details of survived mutants</span>
$ mutmut browse
</code></pre>
<p><strong>Survived = test cases missing from VALID/INVALID</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="adding-test-cases-from-survived-mutants">Adding Test Cases from Survived Mutants</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># mutmut found: &quot;from logging import ...&quot; not detected</span>
<span class="hljs-comment"># → Add cases to INVALID</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">TestReplaceLogging</span>(<span class="hljs-title class_ inherited__">LintRuleTest</span>):
    RULE = ReplaceLoggingWithStructlog

    VALID = [
        <span class="hljs-string">&quot;import structlog&quot;</span>,
        <span class="hljs-string">&quot;from structlog import get_logger&quot;</span>,      <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> Added</span>
        <span class="hljs-string">&quot;import logging_utils&quot;</span>,                   <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> Added: similar name allowed</span>
    ]

    INVALID = [
        <span class="hljs-string">&quot;import logging&quot;</span>,
        <span class="hljs-string">&quot;from logging import getLogger&quot;</span>,          <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> Added</span>
        <span class="hljs-string">&quot;import logging as log&quot;</span>,                  <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> Added</span>
        <span class="hljs-string">&quot;import os, logging&quot;</span>,                     <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/> Added</span>
    ]
</code></pre>
<p><strong>mutmut Survived → add test cases → improve rule robustness</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-class="steps" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="steps" style="--class:steps;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="fixit-rule-strengthening-flow-with-mutmut">Fixit Rule Strengthening Flow with mutmut</h1>
<div class="step-list">
  <div class="step">
    <div class="step-number">1</div>
    <div class="step-content">
      <h3>AI Generates Fixit Rule + VALID/INVALID</h3>
      <p>Auto-generate basic rules and test cases from natural language</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">2</div>
    <div class="step-content">
      <h3>mutmut Mutation-Tests the Rule Code</h3>
      <p>Detect which parts of the rule implementation aren't covered by VALID/INVALID</p>
    </div>
  </div>
  <div class="step">
    <div class="step-number">3</div>
    <div class="step-content">
      <h3>Strengthen VALID/INVALID from Survived Mutants</h3>
      <p>Add missing edge cases to tests, ensuring rule quality</p>
    </div>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-class="panel-emphasis" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="panel-emphasis" style="--class:panel-emphasis;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="the-fixit--mutmut-combination">The Fixit + mutmut Combination</h1>
<div class="panel-container">
  <h2>Protect rule quality with the rule's own tests</h2>
  <p><span class="highlight">Fixit</span> = Enforce code quality with custom rules<br />
  <span class="highlight">mutmut</span> = Verify the completeness of those rules' VALID/INVALID test cases<br /><br />
  AI-generated rules and test cases can "work but not be sufficient." mutmut <span class="highlight">automatically detects gaps in rule test cases</span>, enabling robust custom linters.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-class="section-start" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="section-start" style="--class:section-start;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="09-cicd-integration--operations">09. CI/CD Integration &amp; Operations</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" style="--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="integrating-into-the-cicd-pipeline">Integrating into the CI/CD Pipeline</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># .github/workflows/quality.yml</span>
<span class="hljs-attr">name:</span> <span class="hljs-string">AI</span> <span class="hljs-string">Code</span> <span class="hljs-string">Quality</span> <span class="hljs-string">Gate</span>
<span class="hljs-attr">on:</span> [<span class="hljs-string">pull_request</span>]

<span class="hljs-attr">jobs:</span>
  <span class="hljs-attr">fixit:</span>
    <span class="hljs-attr">runs-on:</span> <span class="hljs-string">ubuntu-latest</span>
    <span class="hljs-attr">steps:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">uses:</span> <span class="hljs-string">actions/checkout@v4</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">uses:</span> <span class="hljs-string">actions/setup-python@v5</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">pip</span> <span class="hljs-string">install</span> <span class="hljs-string">fixit</span> <span class="hljs-string">mutmut</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">fixit</span> <span class="hljs-string">lint</span> <span class="hljs-string">src/</span>                <span class="hljs-comment"># Code quality check</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">mutmut</span> <span class="hljs-string">run</span> <span class="hljs-string">--CI</span>               <span class="hljs-comment"># Test quality check</span>
</code></pre>
<p><strong>Automatically verify code quality + test quality on every PR</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-class="steps-horizontal" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="steps-horizontal" style="--class:steps-horizontal;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-class="qa" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="qa" style="--class:qa;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="faq">FAQ</h1>
<div class="qa-item">
  <div class="question">
    <div class="q-label">Q</div>
    <p>Can AI-generated rules be used as-is?</p>
  </div>
  <div class="answer">
    <div class="a-label">A</div>
    <p>They generally work out of the box, but edge case testing is necessary. Verify with VALID/INVALID patterns using Fixit's built-in test framework before applying to production.</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-class="qa" data-theme="anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l" lang="C" class="qa" style="--class:qa;--theme:anppdk4k3df7lgfutxyvmbu7vsx9a48jm7tk54qx1c9l;">
<h1 id="faq-1">FAQ</h1>
<div class="qa-item">
  <div class="question">
    <div class="q-label">Q</div>
    <p>Doesn't mutmut take a long time to run?</p>
  </div>
  <div class="answer">
    <div class="a-label">A</div>
